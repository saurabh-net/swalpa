<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjust Maadi | SWALPA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="../../assets/img/favicon.png">
    <meta name="theme-color" content="#FFD700">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <meta name="description"
        content="Play Adjust Maadi — an interactive Kannada language generator. Negotiate rent, talk to vendors, and survive Bangalore logistics.">
    <link rel="alternate" hreflang="en" href="https://swalpa.org/games/adjust_maadi/" />
    <link rel="alternate" hreflang="kn" href="https://swalpa.org/games/adjust_maadi/" />
    <link rel="canonical" href="https://swalpa.org/games/adjust_maadi/" />
    <meta property="og:title" content="Adjust Maadi | SWALPA">
    <meta property="og:description"
        content="An interactive Kannada language scenario generator. Negotiate rent, deal with BESCOM, and handle everyday logistics.">
    <meta property="og:url" content="https://swalpa.org/games/adjust_maadi/">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "LearningResource",
        "name": "Adjust Maadi",
        "description": "An interactive scenario generator to practice spoken Bangalore Kannada for everyday logistics.",
        "url": "https://swalpa.org/games/adjust_maadi/",
        "inLanguage": "kn",
        "educationalLevel": "Beginner",
        "learningResourceType": "Game",
        "provider": {
            "@type": "Organization",
            "name": "SWALPA",
            "url": "https://swalpa.org"
        }
    }
    </script>
</head>

<body>
    <div id="app">
        <div class="glass-container">
            <header>
                <div class="stats">
                    <div class="stat-item" id="respect-container">
                        <span class="label">RESPECT</span>
                        <div class="meter-bg">
                            <div id="respect-meter" class="meter-fill" style="width: 25%;"></div>
                        </div>
                        <span class="value" id="respect-rank">Tourist</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">WALLET</span>
                        <span class="value" id="wallet-value">₹500</span>
                    </div>
                    <div class="stat-item patience-container">
                        <span class="label">PATIENCE</span>
                        <div class="patience-bg">
                            <div id="patience-meter" class="patience-fill" style="width: 100%;"></div>
                        </div>
                    </div>
                </div>
            </header>

            <main id="game-scene">
                <!-- Level content will be injected here -->
                <div class="scene-intro">
                    <h1>Adjust Maadi 🤝</h1>
                    <p class="scenario-text">Navigate landlords, street vendors, and neighbours. Use your social
                        currency and 'Adjust Maadi' skills to survive Bangalore logistics.</p>
                    <button id="start-btn" class="primary-btn">Shuru Maadona! (Let's start)</button>
                </div>
            </main>

            <footer>
                <div id="game-controls">
                    <button id="undo-btn" class="control-btn secondary" disabled>↩ Undo (3 left)</button>
                    <button id="restart-btn" class="control-btn secondary" onclick="location.reload()">&#8635;
                        Restart</button>
                </div>
                <div id="dialogue-box" class="hidden">
                    <p id="speaker-name"></p>
                    <p id="dialogue-text"></p>
                    <div id="choices-container"></div>
                </div>
            </footer>
        </div>
    </div>
    <script type="module" src="js/game.js"></script>
</body>

</html>
