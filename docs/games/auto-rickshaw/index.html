<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meter Haaki | SWALPA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <div class="glass-container">
            <header>
                <div class="stats">
                    <div class="stat-item" id="respect-container">
                        <span class="label">RESPECT</span>
                        <div class="meter-bg">
                            <div id="respect-meter" class="meter-fill" style="width: 25%;"></div>
                        </div>
                        <span class="value" id="respect-rank">Tourist</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">WALLET</span>
                        <span class="value" id="wallet-value">₹500</span>
                    </div>
                </div>
                <div class="patience-container">
                    <span class="label">PATIENCE</span>
                    <div class="patience-bg">
                        <div id="patience-meter" class="patience-fill" style="width: 100%;"></div>
                    </div>
                </div>
            </header>

            <main id="game-scene">
                <!-- Level content will be injected here -->
                <div class="scene-intro">
                    <h1>Meter Haaki 🛺</h1>
                    <p class="scenario-text">You are at Indiranagar Metro exit. Autos are waiting. Survive the
                        negotiation, earn respect, and make it across Bangalore — all in Kannada.</p>
                    <button id="start-btn" class="primary-btn">Hogona! (Let's go)</button>
                </div>
            </main>

            <footer>
                <div id="dialogue-box" class="hidden">
                    <p id="speaker-name"></p>
                    <p id="dialogue-text"></p>
                    <div id="choices-container"></div>
                </div>
            </footer>
        </div>
    </div>
    <script type="module" src="js/game.js"></script>
</body>

</html>
