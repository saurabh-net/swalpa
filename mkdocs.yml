site_name: SWALPA
site_url: https://swalpa.org
site_description: Learn practical Bangalore Kannada through phonetics, flashcards, and street-level scenarios. Survival Kannada for expats, tech workers, and newcomers to Bengaluru.
site_author: Saurabh Maurya
repo_url: https://github.com/saurabh-net/swalpa
repo_name: saurabh-net/swalpa
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  logo: assets/img/favicon.png
  favicon: assets/img/favicon.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.breadcrumbs
    - search.suggest
    - search.highlight
    - navigation.footer
  palette:
    - scheme: slate
      primary: yellow
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: yellow
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: Roboto Mono

plugins:
  - search:
      lang: en
  - meta
#  - sitemap:
#      pretty_print: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

extra:
  generator: false
  analytics:
    provider: google
    property: G-QXYDQG6GGN

extra_css:
  - assets/css/custom.css

extra_javascript:
  - https://sdk.userbase.com/2/userbase.js
  - assets/js/storage.js
  - assets/js/auth.js
  - assets/js/init.js
  - assets/js/audio.js
  - assets/js/header.js
  - assets/js/lessons.js
  - assets/js/wotd.js
  - assets/js/share.js

nav:
  - Namaskara: index.md
  - My Profile: profile.md
  - Lesson Summary: summary_slides.md
  - Engage:
      - Games: games/index.md
      - Podcasts: podcasts/index.md
      - Flashcards: flashcards/index.md
  - Lessons:
      - 1. History & Nuances: 01_history_and_nuances.md
      - 2. Survival & Emergencies: 02_survival_and_emergencies.md
      - 3. Social Interactions: 03_social_interactions.md
      - 4. Time & Numbers: 04_time_and_numbers.md
      - 5. Verbs & Grammar: 05_verbs_and_grammar.md
      - 6. Adjectives: 06_adjectives.md
      - 7. Slang: 07_slang.md
      - 8. Travel & Conflict: 08_travel_and_conflict.md
      - 9. Renting & Repairs: 09_everyday_logistics_and_services.md
      - 10. Home & Groceries: 10_household_and_logistics.md
