site_name: SWALPA
site_url: https://swalpa.org
site_description: Learn practical Bangalore Kannada through phonetics, flashcards, and street-level scenarios. Survival Kannada for expats, tech workers, and newcomers to Bengaluru.
site_author: Saurabh Maurya
copyright: '&copy; 2025 SWALPA. A phonetic-only Bangalore Kannada resource.'
repo_url: https://github.com/saurabh-net/swalpa
repo_name: saurabh-net/swalpa
docs_dir: docs

theme:
  name: material
  logo: assets/img/favicon.png
  favicon: assets/img/favicon.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - navigation.footer
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: yellow
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: yellow
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono

plugins:
  - search:
      lang: en
  - sitemap:
      pretty_print: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

extra:
  generator: false

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/audio.js

nav:
  - Namaskara: index.md
  - Lessons:
      - 1. History & Nuances: 01_history_and_nuances.md
      - 2. Survival & Emergencies: 02_survival_and_emergencies.md
      - 3. Social Interactions: 03_social_interactions.md
      - 4. Time & Numbers: 05_time_and_numbers.md
      - 5. Verbs & Grammar: 06_verbs_and_grammar.md
      - 6. Adjectives: 07_adjectives.md
      - 7. Slang: 08_slang.md
      - 8. Travel & Conflict: 09_travel_and_conflict.md
      - 9. Renting & Repairs: 10_everyday_logistics_and_services.md
      - 10. Home & Groceries: 04_household_and_logistics.md
  - Games:
      - Meter Haaki: games/auto_protocol_game.md
  - Flashcards:
      - English to Kannada: 11_flashcards_en_kn.md
      - Kannada to English: 11_flashcards_kn_en.md
